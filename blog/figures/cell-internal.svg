<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" style="font-family: Arial, Helvetica, sans-serif; background: #f5f5f5;">
  <defs>
    <style>
      .box { fill: #eeeeee; stroke: #666666; stroke-width: 1.5; }
      .cell { fill: #dddddd; stroke: #888888; stroke-width: 1; }
      .title { fill: #333333; font-size: 14px; font-weight: bold; }
      .label { fill: #555555; font-size: 10px; }
      .size { fill: #777777; font-size: 11px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="260" y="22" text-anchor="middle" class="title">Internal Node Cell Structure</text>
  
  <!-- Main Box -->
  <rect x="20" y="35" width="480" height="165" rx="6" class="box"/>
  
  <!-- Cell Fields Row 1 -->
  <rect x="35" y="55" width="70" height="45" rx="3" class="cell"/>
  <text x="70" y="76" text-anchor="middle" class="size">4B</text>
  <text x="70" y="90" text-anchor="middle" class="label">Key Size</text>
  
  <rect x="115" y="55" width="90" height="45" rx="3" class="cell"/>
  <text x="160" y="76" text-anchor="middle" class="size">4B</text>
  <text x="160" y="90" text-anchor="middle" class="label">Child Page ID</text>
  
  <rect x="215" y="55" width="100" height="45" rx="3" class="cell"/>
  <text x="265" y="76" text-anchor="middle" class="size">N bytes</text>
  <text x="265" y="90" text-anchor="middle" class="label">Key Data</text>
  
  <!-- Variable Section -->
  <rect x="35" y="110" width="450" height="30" rx="3" fill="#f0f0f0" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="3"/>
  <text x="260" y="130" text-anchor="middle" class="label">Variable-length Key Bytes (N bytes)</text>
  
  <!-- Description inside box -->
  <text x="35" y="175" class="label">N keys → N+1 child pointers</text>
  <text x="320" y="175" class="label">Example: 3 keys = 4 pointers</text>
</svg>
