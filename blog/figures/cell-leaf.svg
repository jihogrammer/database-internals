<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 230" style="font-family: Arial, Helvetica, sans-serif; background: #f5f5f5;">
  <defs>
    <style>
      .box { fill: #eeeeee; stroke: #666666; stroke-width: 1.5; }
      .cell { fill: #dddddd; stroke: #888888; stroke-width: 1; }
      .cell-var { fill: #f0f0f0; stroke: #aaaaaa; stroke-width: 1; stroke-dasharray: 3; }
      .title { fill: #333333; font-size: 14px; font-weight: bold; }
      .label { fill: #555555; font-size: 10px; }
      .size { fill: #777777; font-size: 11px; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="260" y="22" text-anchor="middle" class="title">Leaf Node Cell Structure</text>
  
  <!-- Main Box -->
  <rect x="20" y="35" width="480" height="180" rx="6" class="box"/>
  
  <!-- Fixed Header Row -->
  <rect x="35" y="55" width="50" height="45" rx="3" class="cell"/>
  <text x="60" y="76" text-anchor="middle" class="size">1B</text>
  <text x="60" y="90" text-anchor="middle" class="label">Flags</text>
  
  <rect x="95" y="55" width="50" height="45" rx="3" class="cell"/>
  <text x="120" y="76" text-anchor="middle" class="size">4B</text>
  <text x="120" y="90" text-anchor="middle" class="label">Key Size</text>
  
  <rect x="155" y="55" width="50" height="45" rx="3" class="cell"/>
  <text x="180" y="76" text-anchor="middle" class="size">4B</text>
  <text x="180" y="90" text-anchor="middle" class="label">Value Size</text>
  
  <text x="270" y="76" class="label">Fixed Header (9 bytes)</text>
  
  <!-- Variable Row -->
  <rect x="35" y="110" width="180" height="35" rx="3" class="cell-var"/>
  <text x="125" y="132" text-anchor="middle" class="label">Key Data (N bytes)</text>
  
  <rect x="225" y="110" width="180" height="35" rx="3" class="cell-var"/>
  <text x="315" y="132" text-anchor="middle" class="label">Value Data (M bytes)</text>
  
  <!-- Description inside box -->
  <text x="35" y="180" class="label">Key + Value stored together in leaf nodes</text>
  <text x="380" y="180" class="label">Variable length</text>
</svg>
