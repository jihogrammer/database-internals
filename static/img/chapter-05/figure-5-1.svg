<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <rect width="900" height="220" fill="#ffffff" rx="8"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0b1220">
    <rect x="20" y="20" width="260" height="80" fill="#eef6ff" stroke="#cfe5ff" rx="6" />
    <text x="40" y="44">Logical B-Tree pages</text>
    <rect x="320" y="20" width="260" height="80" fill="#fff7e6" stroke="#ffecb8" rx="6" />
    <text x="340" y="44">Cached (page cache)</text>
    <rect x="620" y="20" width="260" height="80" fill="#eefef1" stroke="#d6f5db" rx="6" />
    <text x="640" y="44">On-disk pages</text>

    <line x1="200" y1="100" x2="400" y2="120" stroke="#9aaed6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="260" y="116" fill="#6b7280">load/copy</text>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#9aaed6" />
      </marker>
    </defs>

    <text x="40" y="120" font-size="11" fill="#475569">Pages can be loaded into cache, modified (dirty), and flushed back to disk.</text>
  </g>
</svg>
